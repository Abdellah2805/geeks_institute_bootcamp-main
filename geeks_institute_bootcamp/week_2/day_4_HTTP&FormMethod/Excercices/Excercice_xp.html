<!DOCTYPE html>
<html>

<head>
  <title>Simple GET Form</title>
</head>

<body>

  <h2>Contact Form</h2>

  <!-- 
    The form uses GET method.
    action="" means the form sends data to the SAME HTML file.
  -->
  <form method="GET" action="">

    <!-- Small text input asking for name -->
    <label>Enter your name:</label><br>
    <input type="text" name="name" placeholder="Your name"><br><br>

    <!-- Larger textarea for message -->
    <label>Write your message:</label><br>
    <textarea name="message" rows="5" cols="30" placeholder="Your message"></textarea><br><br>

    <!-- Submit button -->
    <input type="submit" value="Send">

  </form>

  <!-- 
    When the user clicks "Send":
    Because we use GET, the data appears in the browser URL.

  -->
</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <title>POST Form</title>
</head>

<body>

  <h2>Contact Form</h2>

  <!-- 
    The form now uses POST instead of GET.
    action="" means the data is sent to the SAME HTML file.
  -->
  <form method="POST" action="">

    <!-- Small text input -->
    <label>Enter your name:</label><br>
    <input type="text" name="name" placeholder="Your name"><br><br>

    <!-- Larger textarea -->
    <label>Write your message:</label><br>
    <textarea name="message" rows="5" cols="30" placeholder="Your message"></textarea><br><br>

    <!-- Submit button -->
    <input type="submit" value="Send">

  </form>

  <!-- 
    When you click "Send" with POST:
    The data is sent inside the HTTP request body.
  -->

</body>

</html>
