<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Form to JSON</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }

        input {
            padding: 8px;
            margin-right: 5px;
        }

        button {
            padding: 8px 12px;
        }

        #output {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

    <h2>Create User</h2>

    <form id="userForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="lastname" placeholder="Last Name" required>
        <button type="submit">Send</button>
    </form>

    <p id="output"></p>

    <script src="script.js"></script>
</body>

</html>
