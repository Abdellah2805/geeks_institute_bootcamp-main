<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emoji Guessing Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>😄 Emoji Guessing Game</h1>

    <div class="row">
      <label class="label">
        Your name:
        <input id="playerName" class="input" placeholder="e.g. Yassine" />
      </label>
      <button id="startBtn" class="btn">Start / Reset</button>
    </div>

    <div class="top">
      <div id="scoreBox" class="score">Score: 0</div>
      <button id="nextBtn" class="btn secondary">Next Emoji</button>
    </div>

    <section class="game">
      <div id="emojiBox" class="emoji">❓</div>

      <form id="guessForm" class="options">
      </form>

      <button id="submitBtn" class="btn" disabled>Submit Guess</button>

      <p id="feedback" class="feedback"></p>
    </section>

    <hr />

    <section>
      <h2>🏆 Leaderboard (Top 10)</h2>
      <ol id="leaderboardList" class="leaderboard"></ol>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
