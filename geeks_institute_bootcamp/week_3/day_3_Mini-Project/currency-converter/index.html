<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="box">
      <h1>Currency Converter</h1>

      <div class="row">
        <label>From:</label>
        <select id="from"></select>
      </div>

      <button id="switchBtn" type="button">Switch</button>

      <div class="row">
        <label>To:</label>
        <select id="to"></select>
      </div>

      <div class="row">
        <label>Amount:</label>
        <input id="amount" type="number" value="1" min="0" step="0.01" />
      </div>

      <button id="convertBtn" type="button">Convert</button>

      <p id="result"></p>
      <p id="rate"></p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
